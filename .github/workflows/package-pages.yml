name: Package Single Widget Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (defaults to single-widget-<short-sha>)
        required: false
        type: string
      release_name:
        description: Release title (defaults to Single Widget Package <short-sha>)
        required: false
        type: string
      make_latest:
        description: Mark this release as latest
        required: false
        default: false
        type: boolean

concurrency:
  group: package-pages-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: write

jobs:
  resolve-target:
    name: Resolve Tested Target SHA
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.target.outputs.target_sha }}
    steps:
      - id: target
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RUNS_URL="https://api.github.com/repos/${{ github.repository }}/actions/workflows/ci.yml/runs?branch=master&event=push&status=completed&per_page=50"
          RUNS_JSON="$(curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "$RUNS_URL")"
          TARGET_SHA="$(echo "$RUNS_JSON" | jq -r '.workflow_runs[] | select(.conclusion=="success") | .head_sha' | head -n 1)"

          if [ -z "$TARGET_SHA" ] || [ "$TARGET_SHA" = "null" ]; then
            echo "No successful CI push run found on master; refusing package release."
            exit 1
          fi

          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

  package:
    name: Build and Publish Single Widget Package
    runs-on: ubuntu-latest
    needs:
      - resolve-target
    if: needs.resolve-target.outputs.target_sha != ''
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Check Bun
        run: bun --version

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Prepare Package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          TARGET_SHA="${{ needs.resolve-target.outputs.target_sha }}"
          SHORT_SHA="$(echo "$TARGET_SHA" | cut -c1-12)"
          PACKAGE_DIR="release-single-widget"

          if [ ! -f "dist/webflow-growth-calculator.js" ]; then
            echo "dist/webflow-growth-calculator.js is missing after build"
            exit 1
          fi

          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"

          cp "dist/webflow-growth-calculator.js" "$PACKAGE_DIR/webflow-growth-calculator.js"
          cp "templates/codepen-shell.html" "$PACKAGE_DIR/index.html"

          sed -i 's#</body>#  <script src="./webflow-growth-calculator.js"></script>\n  <script>\n    if (window.ImsGrowthCalculator && typeof window.ImsGrowthCalculator.autoInit === "function") {\n      window.ImsGrowthCalculator.autoInit();\n    }\n  </script>\n</body>#' "$PACKAGE_DIR/index.html"

          if ! grep -q 'webflow-growth-calculator.js' "$PACKAGE_DIR/index.html"; then
            echo "index.html generation failed to include widget script"
            exit 1
          fi

          FILE_COUNT="$(find "$PACKAGE_DIR" -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [ "$FILE_COUNT" -ne 2 ]; then
            echo "Package directory must contain exactly 2 files, found $FILE_COUNT"
            exit 1
          fi

          ARCHIVE_NAME="ims-graph-single-widget-${TARGET_SHA}.zip"
          rm -f "$ARCHIVE_NAME"
          zip -j "$ARCHIVE_NAME" "$PACKAGE_DIR/index.html" "$PACKAGE_DIR/webflow-growth-calculator.js"

          INPUT_TAG="${{ github.event.inputs.tag }}"
          INPUT_RELEASE_NAME="${{ github.event.inputs.release_name }}"
          INPUT_MAKE_LATEST="${{ github.event.inputs.make_latest }}"

          if [ -n "$INPUT_TAG" ]; then
            RELEASE_TAG="$INPUT_TAG"
          else
            RELEASE_TAG="single-widget-${SHORT_SHA}"
          fi

          if [ -n "$INPUT_RELEASE_NAME" ]; then
            RELEASE_NAME="$INPUT_RELEASE_NAME"
          else
            RELEASE_NAME="Single Widget Package ${SHORT_SHA}"
          fi

          if [ "$INPUT_MAKE_LATEST" = "true" ]; then
            MAKE_LATEST="true"
          else
            MAKE_LATEST="false"
          fi

          {
            echo "target_sha=$TARGET_SHA"
            echo "archive_name=$ARCHIVE_NAME"
            echo "release_tag=$RELEASE_TAG"
            echo "release_name=$RELEASE_NAME"
            echo "make_latest=$MAKE_LATEST"
          } >> "$GITHUB_OUTPUT"

      - name: Write Release Notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          This release asset contains the minimal single-widget handoff package (no source code).

          Package contents:
          - \`index.html\` (template-based shell with widget mount + auto-init)
          - \`webflow-growth-calculator.js\` (from \`dist/webflow-growth-calculator.js\`)

          - Commit SHA: \`${{ steps.package.outputs.target_sha }}\`
          - Asset: \`${{ steps.package.outputs.archive_name }}\`
          - Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Triggered By: \`${{ github.actor }}\`
          EOF

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.release_tag }}
          target_commitish: ${{ steps.package.outputs.target_sha }}
          name: ${{ steps.package.outputs.release_name }}
          body_path: release-notes.md
          files: ${{ steps.package.outputs.archive_name }}
          fail_on_unmatched_files: true
          make_latest: ${{ steps.package.outputs.make_latest }}
