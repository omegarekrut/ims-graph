name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      run_browser: ${{ steps.filter.outputs.run_browser }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "run_browser=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED="$(git diff --name-only "$BASE" "$HEAD")"
          if [ -z "$CHANGED" ]; then
            echo "run_browser=false" >> "$GITHUB_OUTPUT"
          elif echo "$CHANGED" | grep -qvE '^(documentation/|.*\.md$)'; then
            echo "run_browser=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_browser=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Typecheck + Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: Check Bun
        run: bun --version
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Unit Tests
        run: bun run test:unit

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs:
      - changes
      - test
    if: needs.changes.outputs.run_browser == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: Check Bun
        run: bun --version
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright Browser
        run: bunx playwright install --with-deps chromium
      - name: E2E Tests
        run: bun run test:e2e
      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
