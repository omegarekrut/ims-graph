name: Deploy Pages

on:
  push:
    branches:
      - master
    paths-ignore:
      - documentation/**
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Test Before Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Unit Tests
        run: bun run test:unit
      - name: Install Playwright Browser
        run: bunx playwright install --with-deps chromium
      - name: E2E Tests
        run: bun run test:e2e

  build:
    name: Build Pages Artifact
    runs-on: ubuntu-latest
    needs:
      - test
    env:
      IMS_PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      IMS_BUILD_ID: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

  deploy:
    name: Publish Pages
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
