name: Deploy Pages

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read

jobs:
  resolve-target:
    name: Resolve Tested Target SHA
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push')
    outputs:
      target_sha: ${{ steps.target.outputs.target_sha }}
    steps:
      - id: target
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TARGET_SHA="${{ github.event.workflow_run.head_sha }}"
            if [ -z "$TARGET_SHA" ]; then
              echo "Missing workflow_run.head_sha"
              exit 1
            fi
            echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUNS_URL="https://api.github.com/repos/${{ github.repository }}/actions/workflows/ci.yml/runs?branch=master&event=push&status=completed&per_page=50"
          RUNS_JSON="$(curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "$RUNS_URL")"
          TARGET_SHA="$(echo "$RUNS_JSON" | jq -r '.workflow_runs[] | select(.conclusion=="success") | .head_sha' | head -n 1)"

          if [ -z "$TARGET_SHA" ] || [ "$TARGET_SHA" = "null" ]; then
            echo "No successful CI push run found on master; refusing manual deploy."
            exit 1
          fi

          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

  build:
    name: Build Pages Artifact
    runs-on: ubuntu-latest
    needs:
      - resolve-target
    if: needs.resolve-target.outputs.target_sha != ''
    env:
      IMS_PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      IMS_BUILD_ID: ${{ needs.resolve-target.outputs.target_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: Check Bun
        run: bun --version
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

  deploy:
    name: Publish Pages
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
